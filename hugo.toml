baseURL = "https://hissab.daksh.be/"
defaultContentLanguage = "en"
title = "Hissab"
enableRobotsTXT = true
enableGitInfo = true

[languages]
  [languages.en]
    locale = "en-IN"

[params]
  description = "India's accountability gap, documented."
  tagline = "We track what happens after the headlines fade."

[taxonomies]
  category = "categories"
  tag = "tags"
  state = "states"
  status = "statuses"

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[frontmatter]
  lastmod = ["lastmod", ":git", "date", "publishDate"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[pagination]
  pagerSize = 20
