{{ define "main" }}
<div class="page-wrap" style="padding-top:32px; padding-bottom:60px;">
  <h1 style="font-family:var(--font-serif);font-size:28px;letter-spacing:-0.02em;margin-bottom:24px;">{{ .Title }}</h1>
  {{ range .Pages }}
  <a class="case-card" href="{{ .RelPermalink }}" style="display:flex;gap:16px;padding:14px 0;border-bottom:0.5px solid var(--gray-border);text-decoration:none;color:inherit;">
    <div>
      <div class="case-title">{{ .Title }}</div>
      <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">{{ .Params.location }}</div>
    </div>
  </a>
  {{ end }}
</div>
{{ end }}
