{{ define "main" }}
<div class="page-wrap" style="max-width: 680px; padding-top: 40px; padding-bottom: 80px;">

  <h1 style="font-family: var(--font-serif); font-size: 32px; letter-spacing: -0.02em; margin-bottom: 8px;">{{ .Title }}</h1>
  {{ with .Description }}<p style="font-size: 15px; color: var(--text-secondary); margin-bottom: 40px; line-height: 1.65;">{{ . }}</p>{{ end }}

  <div style="display: flex; flex-direction: column; gap: 32px;">
    {{ .Content }}
  </div>
</div>
{{ end }}
