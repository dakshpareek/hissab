{{ $allCases := where site.RegularPages "Section" "cases" }}
{{ $currentID := .File.BaseFileName }}
{{ $related := where $allCases "File.BaseFileName" "ne" $currentID | first 4 }}

<div class="detail-sidebar">

  <div class="sidebar-block">
    <div class="sidebar-title">Share &amp; contribute</div>
    <button class="btn-share" onclick="shareOnX()">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      Share on X
    </button>
    <button class="btn-share" onclick="copyLink()">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copy link
    </button>
    <a class="btn-submit" href="https://github.com/dakshpareek/hissab/issues/new?title=Update:+{{ .Title | urlize }}&labels=case-update" target="_blank" rel="noopener">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Submit an update
    </a>
  </div>

  {{ with $related }}
  <div class="sidebar-block">
    <div class="sidebar-title">Related cases</div>
    {{ range . }}
    <a class="related-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
    {{ end }}
  </div>
  {{ end }}

</div>

<script>
function shareOnX() {
  const text = encodeURIComponent('{{ .Title }} — tracking accountability on Hissab');
  const url  = encodeURIComponent(window.location.href);
  window.open('https://x.com/intent/tweet?text=' + text + '&url=' + url, '_blank');
}
</script>
