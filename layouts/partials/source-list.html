{{ with .Params.sources }}
  <section class="sources-block">
    <div class="section-heading">
      <p class="eyebrow">Sources</p>
      <h2>Public references</h2>
    </div>

    <ul class="sources-list">
      {{ range . }}
        <li class="sources-list__item">
          <a href="{{ .url }}" target="_blank" rel="noopener noreferrer">{{ .title }}</a>
          <span>
            {{ with .publisher }}{{ . }}{{ end }}
            {{ with .date }} · {{ . | time.Format "2 Jan 2006" }}{{ end }}
          </span>
        </li>
      {{ end }}
    </ul>
  </section>
{{ end }}
