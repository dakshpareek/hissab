<header class="site-header">
  <div class="site-header__inner">
    <a class="brand" href="{{ "/" | relURL }}" aria-label="{{ site.Title }} home">
      <span class="brand__mark">H</span>
      <span class="brand__text">
        <strong>{{ site.Title }}</strong>
        <small>Public record archive</small>
      </span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      {{ range site.Menus.main }}
        <a
          href="{{ .URL | relURL }}"
          {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}aria-current="page"{{ end }}
        >
          {{ .Name }}
        </a>
      {{ end }}
    </nav>
  </div>
</header>
